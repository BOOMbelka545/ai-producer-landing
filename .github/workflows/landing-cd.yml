name: landing-cd

on:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: landing-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    env:
      DEPLOY_HOST: ${{ secrets.LANDING_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.LANDING_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.LANDING_DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.LANDING_DEPLOY_PATH }}
      BACKEND_PATH: ${{ secrets.LANDING_BACKEND_PATH }}
      BACKEND_SERVICE: ${{ secrets.LANDING_BACKEND_SERVICE }}
      SITE_URL: ${{ secrets.LANDING_SITE_URL }}
      CDN_INVALIDATION_URL: ${{ secrets.LANDING_CDN_INVALIDATION_URL }}
      CDN_INVALIDATION_TOKEN: ${{ secrets.LANDING_CDN_INVALIDATION_TOKEN }}
      NOTIFY_WEBHOOK_URL: ${{ secrets.LANDING_NOTIFY_WEBHOOK_URL }}
      TG_BOT_TOKEN: ${{ secrets.LANDING_TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.LANDING_TG_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release id
        run: |
          RELEASE_ID="${GITHUB_SHA}-${GITHUB_RUN_ID}"
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"

      - name: Validate required secrets
        run: |
          required=(DEPLOY_HOST DEPLOY_USER DEPLOY_PATH SITE_URL)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

          if [ -z "${{ secrets.LANDING_DEPLOY_SSH_KEY }}" ]; then
            echo "Missing required secret: LANDING_DEPLOY_SSH_KEY"
            exit 1
          fi

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build artifact
        run: npm run build

      - name: Prepare SSH key
        env:
          LANDING_DEPLOY_SSH_KEY: ${{ secrets.LANDING_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("LANDING_DEPLOY_SSH_KEY", "")
          if not raw:
              raise SystemExit("LANDING_DEPLOY_SSH_KEY is empty")

          if "BEGIN OPENSSH PRIVATE KEY" not in raw and "BEGIN RSA PRIVATE KEY" not in raw:
              try:
                  raw = base64.b64decode(raw).decode("utf-8")
              except Exception:
                  pass

          normalized = raw.replace("\r", "").replace("\\n", "\n").strip() + "\n"
          Path("/home/runner/.ssh/landing_deploy_key").write_text(normalized, encoding="utf-8")
          PY
          chmod 600 ~/.ssh/landing_deploy_key
          ssh-keygen -y -f ~/.ssh/landing_deploy_key >/dev/null

      - name: Prepare SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifact to host
        run: |
          CLEAN_DEPLOY_PATH="$(printf '%s' "${DEPLOY_PATH:-}" | tr -d '\r' | xargs)"
          if [ -z "$CLEAN_DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH is empty after normalization"
            exit 1
          fi
          TAR_PATH="dist/landing-site-${GITHUB_SHA}.tar.gz"

          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '$CLEAN_DEPLOY_PATH'"

          scp -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -P "${DEPLOY_PORT:-22}" "$TAR_PATH" "${DEPLOY_USER}@${DEPLOY_HOST}:${CLEAN_DEPLOY_PATH}/landing-${RELEASE_ID}.tar.gz"

      - name: Activate release on host
        run: |
          CLEAN_DEPLOY_PATH="$(printf '%s' "${DEPLOY_PATH:-}" | tr -d '\r' | xargs)"
          if [ -z "$CLEAN_DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH is empty after normalization"
            exit 1
          fi
          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -s -- '$CLEAN_DEPLOY_PATH' '${RELEASE_ID}'" <<'EOF'
          set -euo pipefail
          DEPLOY_PATH="$1"
          RELEASE_ID="$2"
          mkdir -p "$DEPLOY_PATH/releases" "$DEPLOY_PATH/shared"
          RELEASE_DIR="$DEPLOY_PATH/releases/$RELEASE_ID"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "$DEPLOY_PATH/landing-$RELEASE_ID.tar.gz" -C "$RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"
          rm -f "$DEPLOY_PATH/landing-$RELEASE_ID.tar.gz"
          ls -1dt "$DEPLOY_PATH"/releases/* 2>/dev/null | tail -n +8 | xargs -r rm -rf
          EOF

      - name: Verify release marker on server
        run: |
          CLEAN_DEPLOY_PATH="$(printf '%s' "${DEPLOY_PATH:-}" | tr -d '\r' | xargs)"
          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; test -f \"$CLEAN_DEPLOY_PATH/current/deploy-meta.txt\"; grep -q \"sha=${GITHUB_SHA}\" \"$CLEAN_DEPLOY_PATH/current/deploy-meta.txt\"; grep -q \"release_id=${RELEASE_ID}\" \"$CLEAN_DEPLOY_PATH/current/deploy-meta.txt\""

      - name: Sync backend API server.py and restart service
        run: |
          CLEAN_BACKEND_PATH="$(printf '%s' "${BACKEND_PATH:-/var/www/landing/landing}" | tr -d '\r' | xargs)"
          SERVICE_NAME="$(printf '%s' "${BACKEND_SERVICE:-landing}" | tr -d '\r' | xargs)"
          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '$CLEAN_BACKEND_PATH'"
          scp -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -P "${DEPLOY_PORT:-22}" "server.py" "${DEPLOY_USER}@${DEPLOY_HOST}:${CLEAN_BACKEND_PATH}/server.py"
          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "systemctl restart '$SERVICE_NAME' && systemctl is-active '$SERVICE_NAME'"

      - name: Invalidate CDN/cache
        run: |
          if [ -z "${CDN_INVALIDATION_URL:-}" ]; then
            echo "CDN invalidation skipped: LANDING_CDN_INVALIDATION_URL is not set"
          elif [ -n "${CDN_INVALIDATION_TOKEN:-}" ]; then
            curl -fsS -X POST "$CDN_INVALIDATION_URL" -H "Authorization: Bearer $CDN_INVALIDATION_TOKEN"
          else
            curl -fsS -X POST "$CDN_INVALIDATION_URL"
          fi

      - name: Post-deploy health-check
        run: ./scripts/post-deploy-check.sh "$SITE_URL"

      - name: External marker integrity check
        run: |
          TARGET_URL="${SITE_URL%/}/deploy-meta.txt?v=${RELEASE_ID}"
          echo "Checking external marker at: $TARGET_URL"
          ok=0
          last_body=""
          for attempt in $(seq 1 12); do
            last_body="$(curl -sS -L \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              "$TARGET_URL" || true)"
            if echo "$last_body" | grep -q "sha=${GITHUB_SHA}" && echo "$last_body" | grep -q "release_id=${RELEASE_ID}"; then
              ok=1
              echo "External marker check passed on attempt $attempt"
              break
            fi
            echo "External marker not yet updated (attempt $attempt/12), retrying in 10s..."
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "External marker check failed after retries."
            echo "Last response body:"
            echo "$last_body"
            exit 1
          fi

      - name: Auto rollback if deploy validation failed
        if: failure()
        run: |
          CLEAN_DEPLOY_PATH="$(printf '%s' "${DEPLOY_PATH:-}" | tr -d '\r' | xargs)"
          if [ -z "$CLEAN_DEPLOY_PATH" ]; then
            echo "Rollback skipped: DEPLOY_PATH is empty"
            exit 0
          fi
          PREV_RELEASE="$(ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "ls -1dt \"$CLEAN_DEPLOY_PATH\"/releases/* 2>/dev/null | sed -n '2p' | xargs -r -n1 basename")"
          if [ -z "$PREV_RELEASE" ]; then
            echo "Rollback skipped: previous release not found"
            exit 0
          fi
          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; TARGET=\"$CLEAN_DEPLOY_PATH/releases/$PREV_RELEASE\"; test -d \"$TARGET\"; ln -sfn \"$TARGET\" \"$CLEAN_DEPLOY_PATH/current\""
          echo "Auto rollback complete: $PREV_RELEASE"

      - name: Notify success
        if: success()
        run: |
          MESSAGE="[CI/CD] Landing deploy SUCCESS: ${GITHUB_REPOSITORY}@${GITHUB_SHA} release=${RELEASE_ID}"
          if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
            curl -fsS -X POST "$NOTIFY_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${MESSAGE}\"}"
          elif [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}"
          else
            echo "Notification skipped: neither webhook nor Telegram secrets are configured"
          fi

      - name: Notify failure
        if: failure()
        run: |
          MESSAGE="[CI/CD] Landing deploy FAILED: ${GITHUB_REPOSITORY}@${GITHUB_SHA} release=${RELEASE_ID}. Auto-rollback attempted. Check run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
            curl -fsS -X POST "$NOTIFY_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${MESSAGE}\"}"
          elif [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}"
          else
            echo "Notification skipped: neither webhook nor Telegram secrets are configured"
          fi
