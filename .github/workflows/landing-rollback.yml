name: landing-rollback

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release ID from /releases/<release_id> (leave empty to rollback to previous)'
        required: false
        type: string
      site_url:
        description: 'Override site URL for health-check (optional)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.LANDING_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.LANDING_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.LANDING_DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.LANDING_DEPLOY_PATH }}
      DEFAULT_SITE_URL: ${{ secrets.LANDING_SITE_URL }}
      NOTIFY_WEBHOOK_URL: ${{ secrets.LANDING_NOTIFY_WEBHOOK_URL }}
      TG_BOT_TOKEN: ${{ secrets.LANDING_TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.LANDING_TG_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          required=(DEPLOY_HOST DEPLOY_USER DEPLOY_PATH DEFAULT_SITE_URL)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

          if [ -z "${{ secrets.LANDING_DEPLOY_SSH_KEY }}" ]; then
            echo "Missing required secret: LANDING_DEPLOY_SSH_KEY"
            exit 1
          fi

      - name: Prepare SSH key
        env:
          LANDING_DEPLOY_SSH_KEY: ${{ secrets.LANDING_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("LANDING_DEPLOY_SSH_KEY", "")
          if not raw:
              raise SystemExit("LANDING_DEPLOY_SSH_KEY is empty")

          if "BEGIN OPENSSH PRIVATE KEY" not in raw and "BEGIN RSA PRIVATE KEY" not in raw:
              try:
                  raw = base64.b64decode(raw).decode("utf-8")
              except Exception:
                  pass

          normalized = raw.replace("\r", "").replace("\\n", "\n").strip() + "\n"
          Path("/home/runner/.ssh/landing_deploy_key").write_text(normalized, encoding="utf-8")
          PY
          chmod 600 ~/.ssh/landing_deploy_key
          ssh-keygen -y -f ~/.ssh/landing_deploy_key >/dev/null

      - name: Prepare SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Rollback current symlink
        run: |
          TARGET_RELEASE='${{ github.event.inputs.release_id }}'
          CLEAN_DEPLOY_PATH="$(printf '%s' "${DEPLOY_PATH:-}" | tr -d '\r' | xargs)"
          if [ -z "$CLEAN_DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH is empty after normalization"
            exit 1
          fi

          if [ -z "$TARGET_RELEASE" ]; then
            TARGET_RELEASE="$(ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "bash -s -- '$CLEAN_DEPLOY_PATH'" <<'EOF'
            set -euo pipefail
            DEPLOY_PATH="$1"
            mapfile -t releases < <(find "$DEPLOY_PATH/releases" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -r)
            if [ "${#releases[@]}" -lt 2 ]; then
              echo ""
              exit 0
            fi
            printf '%s' "${releases[1]}"
            EOF
            )"
          fi

          if [ -z "$TARGET_RELEASE" ]; then
            echo "Could not determine target release. There is no previous release yet. Deploy one more release first or pass release_id manually."
            exit 1
          fi

          echo "TARGET_RELEASE=$TARGET_RELEASE" >> "$GITHUB_ENV"

          ssh -i ~/.ssh/landing_deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -s -- '$CLEAN_DEPLOY_PATH' '$TARGET_RELEASE'" <<'EOF'
          set -euo pipefail
          DEPLOY_PATH="$1"
          TARGET_RELEASE="$2"
          TARGET="$DEPLOY_PATH/releases/$TARGET_RELEASE"
          test -d "$TARGET"
          ln -sfn "$TARGET" "$DEPLOY_PATH/current"
          EOF

      - name: Post-rollback health-check
        run: |
          SITE_URL='${{ github.event.inputs.site_url }}'
          if [ -z "$SITE_URL" ]; then
            SITE_URL="$DEFAULT_SITE_URL"
          fi
          ./landing/scripts/post-deploy-check.sh "$SITE_URL"

      - name: Notify success
        if: success()
        run: |
          MESSAGE="Landing rollback SUCCESS: target=${TARGET_RELEASE}, run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
            curl -fsS -X POST "$NOTIFY_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${MESSAGE}\"}"
          elif [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}"
          else
            echo "Notification skipped: neither webhook nor Telegram secrets are configured"
          fi

      - name: Notify failure
        if: failure()
        run: |
          MESSAGE="Landing rollback FAILED: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
            curl -fsS -X POST "$NOTIFY_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${MESSAGE}\"}"
          elif [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}"
          else
            echo "Notification skipped: neither webhook nor Telegram secrets are configured"
          fi
